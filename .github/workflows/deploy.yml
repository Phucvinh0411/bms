name: Tự động hóa Deploy BMS Backend sang AWS EC2

on:
  push:
    branches:
      - main # Pipeline sẽ tự chạy mỗi khi bạn push code hoặc merge PR vào nhánh main

jobs:
  deploy_to_ec2:
    name: Triển khai ứng dụng lên server EC2
    runs-on: ubuntu-latest

    steps:
      - name: Lấy mã nguồn mới nhất từ GitHub
        uses: actions/checkout@v4

      - name: Đăng nhập EC2 và thực thi lệnh Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script: |
            # 1. Tạo thư mục deploy nếu chưa có và di chuyển vào đó
            mkdir -p ~/bms && cd ~/bms

            # 2. Clone mã nguồn nếu chưa có, hoặc reset và pull code mới nhất từ nhánh main
            if [ ! -d ".git" ]; then
              echo "Thư mục dự án chưa có Git, tiến hành clone..."
              git clone https://github.com/Phucvinh0411/bms.git .
            else
              echo "Thư mục dự án đã có, tiến hành đồng bộ code mới nhất..."
              git fetch --all
              git reset --hard origin/main
            fi

            # 3. Ghi đè file .env đầy đủ từ GitHub Secret
            echo "${{ secrets.ENV_FILE }}" > .env

            # 4. Khởi chạy toàn bộ hệ thống bằng docker-compose.prod.yml
            echo "Đang khởi chạy hệ thống bằng Docker Compose..."
            docker compose -f docker-compose.prod.yml up -d --build

            # 5. Dọn dẹp các tài nguyên Docker thừa để tiết kiệm ổ đĩa EC2
            echo "Dọn dẹp hệ thống Docker..."
            docker system prune -af