spring:
  application:
    name: product-service
  config:
    import: optional:file:/app/.env
  datasource:
    url: ${PRODUCT_DB_URL:jdbc:postgresql://postgres:5432/product_db}
    username: ${PRODUCT_DB_USER:product_db}
    password: ${PRODUCT_DB_PASSWORD:product_db}

  sql:
    init:
      mode: always

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}

  jpa:
    defer-datasource-initialization: true
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

openrouter:
  ai:
    api-key: ${OPENROUTER_API_KEY:}
    base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
    embedding:
      model: ${OPENROUTER_EMBEDDING_MODEL:cohere/embed-multilingual-v3.0}
    intent:
      model: ${OPENROUTER_INTENT_MODEL:google/gemini-2.5-flash}
    chat:
      model: ${OPENROUTER_CHAT_MODEL:google/gemini-2.5-flash}

server:
  port: 8082
  error:
    include-message: always

aws:
  region: ${AWS_REGION}
  access:
    key: ${AWS_ACCESS_KEY}
  secret:
    key: ${AWS_SECRET_KEY}
  s3:
    bucket: ${AWS_S3_BUCKET:bms.image}
