services:


  identity-service:
    build:
      context: ./services/identity-service
      dockerfile: Dockerfile
    image: ${IDENTITY_SERVICE_IMAGE:-identity-service:latest}
    container_name: identity-service
    restart: on-failure

    deploy:
      resources:
        limits:
          memory: 768M
        reservations:
          memory: 512M
    environment:
      - IDENTITY_DB_URL=${IDENTITY_DB_URL}
      - IDENTITY_DB_USER=${IDENTITY_DB_USER}
      - IDENTITY_DB_PASSWORD=${IDENTITY_DB_PASSWORD}
      - SPRING_DATASOURCE_URL=${IDENTITY_DB_URL}
      - SPRING_DATASOURCE_USERNAME=${IDENTITY_DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${IDENTITY_DB_PASSWORD}
      - SPRING_FLYWAY_CREATE_SCHEMAS=true
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      - AWS_ACCESS_KEY=${AWS_ACCESS_KEY:-local-dev-access-key}
      - AWS_SECRET_KEY=${AWS_SECRET_KEY:-local-dev-secret-key}
      - AWS_REGION=${AWS_REGION:-ap-southeast-1}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET:-local-dev-bucket}
    networks:
      - bookstore-network

  product-service:
    build:
      context: ./services/product-service
      dockerfile: Dockerfile
    image: ${PRODUCT_SERVICE_IMAGE:-product-service:latest}
    container_name: product-service
    restart: on-failure
    env_file:
      - .env
    volumes:
      - ./.env:/app/.env:ro
    depends_on:
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 768M
    environment:
      - PRODUCT_DB_URL=${PRODUCT_DB_URL}
      - PRODUCT_DB_USER=${PRODUCT_DB_USER}
      - PRODUCT_DB_PASSWORD=${PRODUCT_DB_PASSWORD}
      - SPRING_DATASOURCE_URL=${PRODUCT_DB_URL}
      - SPRING_DATASOURCE_USERNAME=${PRODUCT_DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${PRODUCT_DB_PASSWORD}
      - AWS_ACCESS_KEY=${AWS_ACCESS_KEY:-local-dev-access-key}
      - AWS_SECRET_KEY=${AWS_SECRET_KEY:-local-dev-secret-key}
      - AWS_REGION=${AWS_REGION:-ap-southeast-1}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET:-local-dev-bucket}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENROUTER_BASE_URL=${OPENROUTER_BASE_URL}
      - OPENROUTER_EMBEDDING_MODEL=${OPENROUTER_EMBEDDING_MODEL}
      - OPENROUTER_INTENT_MODEL=${OPENROUTER_INTENT_MODEL}
      - OPENROUTER_CHAT_MODEL=${OPENROUTER_CHAT_MODEL}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    networks:
      - bookstore-network

  order-service:
    build:
      context: ./services/order-service
      dockerfile: Dockerfile
    image: ${ORDER_SERVICE_IMAGE:-order-service:latest}
    container_name: order-service
    restart: on-failure
    depends_on:
      rabbitmq:
        condition: service_started
      redis:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 768M
    environment:
      - ORDER_DB_URL=${ORDER_DB_URL}
      - ORDER_DB_USER=${ORDER_DB_USER}
      - ORDER_DB_PASSWORD=${ORDER_DB_PASSWORD}
      - SPRING_DATASOURCE_URL=${ORDER_DB_URL}
      - SPRING_DATASOURCE_USERNAME=${ORDER_DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${ORDER_DB_PASSWORD}
      - SPRING_FLYWAY_CREATE_SCHEMAS=true
      - PAYOS_CLIENT_ID=${PAYOS_CLIENT_ID}
      - PAYOS_API_KEY=${PAYOS_API_KEY}
      - PAYOS_CHECKSUM_KEY=${PAYOS_CHECKSUM_KEY}
      - SPRING_RABBITMQ_HOST=rabbitmq
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - APP_FRONTEND_URL=${APP_FRONTEND_URL:-http://localhost:3000}
    networks:
      - bookstore-network

  promotion-service:
    build:
      context: ./services/promotion-service
      dockerfile: Dockerfile
    image: ${PROMOTION_SERVICE_IMAGE:-promotion-service:latest}
    container_name: promotion-service
    restart: on-failure

    deploy:
      resources:
        limits:
          memory: 768M
    environment:
      - PROMOTION_DB_URL=${PROMOTION_DB_URL}
      - PROMOTION_DB_USER=${PROMOTION_DB_USER}
      - PROMOTION_DB_PASSWORD=${PROMOTION_DB_PASSWORD}
      - SPRING_DATASOURCE_URL=${PROMOTION_DB_URL}
      - SPRING_DATASOURCE_USERNAME=${PROMOTION_DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${PROMOTION_DB_PASSWORD}
      - SPRING_FLYWAY_CREATE_SCHEMAS=true
    networks:
      - bookstore-network

  report-service:
    build:
      context: ./services/report-service
      dockerfile: Dockerfile
    image: ${REPORT_SERVICE_IMAGE:-report-service:latest}
    container_name: report-service
    restart: on-failure

    deploy:
      resources:
        limits:
          memory: 768M
    environment:
      - REPORT_DB_URL=${REPORT_DB_URL}
      - REPORT_DB_USER=${REPORT_DB_USER}
      - REPORT_DB_PASSWORD=${REPORT_DB_PASSWORD}
      - SPRING_DATASOURCE_URL=${REPORT_DB_URL}
      - SPRING_DATASOURCE_USERNAME=${REPORT_DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${REPORT_DB_PASSWORD}
      - SPRING_FLYWAY_CREATE_SCHEMAS=true
    networks:
      - bookstore-network

  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    image: ${GATEWAY_IMAGE:-gateway:latest}
    container_name: gateway
    restart: unless-stopped
    ports:
      - "${GATEWAY_PORT:-80}:80"
      - "443:443"
    depends_on:
      - identity-service
      - product-service
      - order-service
      - promotion-service
      - report-service
    deploy:
      resources:
        limits:
          memory: 512M
    networks:
      - bookstore-network
    volumes:
      - ./gateway/nginx.prod.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro



  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: bookstore-rabbitmq
    restart: unless-stopped
    ports:
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest
    networks:
      - bookstore-network

  redis:
    image: redis:7-alpine
    container_name: bookstore-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    networks:
      - bookstore-network

  reranker-service:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    container_name: reranker-service
    restart: unless-stopped
    ports:
      - "8085:80"
    volumes:
      - reranker_data:/data
    command: --model-id onnx-community/bge-reranker-v2-m3-ONNX --max-batch-tokens 4096
    networks:
      - bookstore-network

volumes:
  reranker_data:

networks:
  bookstore-network:
    name: bookstore-network
    driver: bridge

